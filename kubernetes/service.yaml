
apiVersion: v1
kind: Service
metadata:
  name: jobagent-api-service
  labels:
    app: jobagent-api
spec:
  type: ClusterIP
  selector:
    app: jobagent-api
  ports:
  - port: 80
    targetPort: 8000
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: jobagent-api-external
  labels:
    app: jobagent-api
spec:
  type: LoadBalancer
  selector:
    app: jobagent-api
  ports:
  - port: 80
    targetPort: 8000
    name: http
  externalTrafficPolicy: Local
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
