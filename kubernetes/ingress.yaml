
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jobagent-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  rules:
  - host: api.jobagent.example.com
    http:
      paths:
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: jobagent-api-service
            port:
              number: 80
      - path: /mcp/
        pathType: Prefix
        backend:
          service:
            name: jobagent-api-service
            port:
              number: 80
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: jobagent-api-service
            port:
              number: 80
  - host: docs.jobagent.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jobagent-api-service
            port:
              number: 80
