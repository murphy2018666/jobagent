
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    upstream jobagent_backend {
        server jobagent-api:8000;
        server jobagent-api-1:8000;
        server jobagent-api-2:8000;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://jobagent_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /health {
            proxy_pass http://jobagent_backend/health;
            access_log off;
        }

        location /docs {
            proxy_pass http://jobagent_backend/docs;
        }

        location /redoc {
            proxy_pass http://jobagent_backend/redoc;
        }
    }
}
